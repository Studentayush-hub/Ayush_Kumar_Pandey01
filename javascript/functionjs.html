        //Anonymous function:A function that does not have an identifier(name) associated with it.

        let msg=function(){
            console.log("Hello ABES");

        }
        msg();
        //short code for above function i.e, arrow function

        let msg1=()=>console.log("Hello ABES");
                   
    

        //arrow function with multiple lines
        let msg2=(age)=>{
            if(age>=18){
                console.log("valid age");
            }

            
        }
        msg2(23);

        //Call back function:

        function cal(a,b,callback){
            var num1=a;
            console.log("First number is" +num1);
            var num2=b;
            console.log("Second number is" + num2);
            var res =num1+num2;
            callback(res);

        }
        function display(res){
            console.log("Result is" + res);
        }
        cal(3,4,display);

        //call back using set timeout API
        function greeting(){
           console.log("Hello Student");
        }
        function loading(){
            console.log("Data loading....");

        }
        loading();
        setTimeout(greeting,2000);

        //javascript promises:It were created to make asynchronous js easier to use.
        //promises stages..
        //pending: operation started
        //rejected:operation failed
        
        //fullfilled:operation completed
        let promise=new Promise(function(resolve,reject){
            let myAge=23;
            if(myAge>=18){
                resolve("valid age");
            }
            else{
                reject("wait for next year");
            }
        });
        promise.then(result=>console.log(result)).catch
        (error=>console.log(error));
