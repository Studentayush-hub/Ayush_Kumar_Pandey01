<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object in JS</title>
    
</head>
<body>
    <script>
        //object in js : collection of keys(properties) and its value.

        //create an object using literal way...

        let student ={
            name:"Ayush",
            age:18,
            isMarried:false,
            address:{
                streetNo:23,
                area:" Sector-49",
                city:"Noida",
                pincode:201301

            },
            course:"B.Tech",
            branch: "cse",
            year:2025,
            getInfo:function(){
                return "My education details is" + student.branch + " " + student.year;
            },
            subjects: ["Maths","Hindi","Science","English"],
            examDone:null
        };
        //access objects keys or property
        console.log(student.address.pincode);//object
        console.log(student.getInfo());//function
        console.log(student.subjects[2]); //array
        //console.log(typeof(student));
        //find any key in your object
        console.log('name' in student);

        //delete any key from object
        console.log(delete student.name);
        console.log(student);

        //find length of object
        let keysLength=Object.keys(student);
        console.log(keysLength.length);

        //iterate object`s keys(properties) using for loop
        for(let i=0; i<keysLength.length;i++){
            console.log(student[keysLength[i]]);
        }
        //iterate object`s keys(properties) using for.. in loop

        for(let x in student){
            console.log(student[x]);
        }

        //create an object using new keyword
        let myInfo=new Object();
        myInfo.name="Ayush";
        myInfo.age=18;
        myInfo.city="Delhi";
        myInfo.address=null;
        myInfo.mob= 87570536222;

        //access objects keys using[]
        console.log(myInfo['name']);
        


    </script>
    
</body>
</html>
