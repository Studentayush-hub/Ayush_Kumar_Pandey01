<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM in JS</title>
</head>
<body>
    
         <!--It is a programming interface that represents the structure of an HTML
          or XML document as a tree of objects, allowing JavaScript to access, modify,
          add, or delete elements dynamically.-->
          <h2> Check your age to cast the vote!</h2>
          <form action=" ">
            <input type ="number" placeholder="enter your age!" name="age" id="age"/>
            <input type="submit" value="submit " onclick=" result()"/>
          </form>
          <script>
            function result(){
                let myAge=document.getElementById('age').value;//it will get the value of input field
                if(myAge>=18){
                  alert("you are eligible to vote");
                }
                else{
                  alert("you are not eligible to vote");
                }
            }
          </script>
    
    
</body>
</html>
